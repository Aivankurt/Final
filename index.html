<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Philippine Artistry</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <ul class="nav-list">
        <li><a href="index.html" class="nav-link" style="color: var(--accent-color);">Home</a></li>
        <li><a href="tutorials.html" class="nav-link">Tutorials</a></li>
        <li><a href="history.html" class="nav-link">Arts & History</a></li>
    </ul>
</nav>

<main style="margin-left: 0;">
    <section id="home" class="page-section active">
        <div class="home-hero">
            <h1 class="home-title">Welcome!</h1>
            <h2 class="home-subtitle">Philippine Artistry Art Gallery</h2>
            <div class="login-card">
                <h3 class="login-header">Log-in</h3>
                <form id="loginForm">
                    <input type="text" id="user" class="form-input" placeholder="Username" required>
                    <input type="password" id="pass" class="form-input" placeholder="Password" required>
                    <button type="submit" class="btn-submit">Log In</button>
                </form>
            </div>
        </div>
    </section>
</main>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        if (user === 'admin' && pass === 'password') {
            window.location.href = 'history.html'; 
        } else {
            alert('Incorrect credentials. Try admin/password.');
        }
    });
</script>
</body>
</html>
